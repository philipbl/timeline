name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so make app can stamp the version
          fetch-depth: 0
          fetch-tags: true

      - name: Build app
        run: make app

      - name: Zip app
        run: ditto -c -k --keepParent build/Timeline.app Timeline.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: Timeline.zip
          generate_release_notes: true
          body: |
            Download **Timeline.zip**, unzip, and drag Timeline.app to
            Applications.

            The build is ad-hoc signed, so on first launch macOS will warn
            that the app is from an unidentified developer — right-click
            the app, choose **Open**, and confirm. (Or run
            `xattr -dr com.apple.quarantine Timeline.app`.)
