name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cd TimelineApp && swift build

      - name: Run tests
        run: TimelineApp/.build/debug/TimelineApp --self-test

      - name: Render example timeline
        run: |
          TimelineApp/.build/debug/TimelineApp --render example.timeline example.pdf
          TimelineApp/.build/debug/TimelineApp --render example.timeline example.png

      - name: Golden image check
        run: |
          TimelineApp/.build/debug/TimelineApp --compare example.png docs/example.png 3

      - name: Upload rendered example
        uses: actions/upload-artifact@v4
        with:
          name: example-timeline
          path: |
            example.pdf
            example.png
